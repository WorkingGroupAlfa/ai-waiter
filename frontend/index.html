<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="format-detection" content="telephone=no">
    <meta name="color-scheme" content="light dark">
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@300;400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.css" />
    <link rel="stylesheet" href="css/iconsfont.css">
    <link rel="stylesheet" href="css/style.css">
    <title>Azuma</title>
</head>

<body class="home">

    <!-- Видео на фоне -->
    <video autoplay muted loop playsinline id="bgVideo">
        <source src="img/ack.MP4" type="video/mp4">
    </video>

    <div class="wrapper">
        <main class="main__main">
            <div class="main__container">
                <div class="image_css_main">
                    <img class="image_css_main"
                        style="width: 100%; max-height: 200PX; object-fit: contain; padding: 5PX;"
                        src="img/668_1699971513.webp">
                </div>
                <div class="restraunt_name_main">
                    <div class="menu">

                        <div class="menu-list">
                            <a data-i18n="Menu" href="menu" class="menu-list_item">Меню <img width="15px" class="arrow"
                                    src="img/arrow.svg"></a>
                            <a data-i18n="Bar" href="bar" class="menu-list_item"> Бар <img width="15px" class="arrow"
                                    src="img/arrow.svg"></a>
                            <a href="wine" data-i18n="Wine_card" class="menu-list_item"> ВИННА КАРТА </a>
                            <a data-i18n="Tea_Card" href="tea" class="menu-list_item"> Чайна карта <img width="15px"
                                    class="arrow" src="img/arrow.svg"></a>

                        </div>
                    </div>

                    <div class="lang-switch">
                        <button id="lang-ua" class="lang-btn active">UA</button>
                        <button id="lang-en" class="lang-btn">EN</button>
                    </div>

                    <div class="link_body">
                        <div class="circle-links">
                            <a href="https://www.instagram.com/azumaodessa/?hl=en" target="_blank"><img
                                    src="img/inst.svg"></a>
                            <a href="tel:+380674845344"><img src="img/phone.svg"></a>
                            <a href="https://bond.delivery/restaurant/azuma/" target="_blank"><img src="img/bond.svg"
                                    style="width: 30px;"></a>

                        </div>

                    </div>

                </div>
            </div>

        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.js"></script>
    <script src="script.js"></script>
    <script src="lang.js"></script>

</body>

</html>
